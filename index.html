<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO-QUANT_OS // v2.7.0</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root {
            --bg: #050505; --panel: #0a0a0a; --accent: #00ffcc;
            --text: #00ffcc; --dim: #008f7a; --border: #1a1a1a;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Courier New', monospace; margin: 0; padding: 10px;
            display: grid; 
            grid-template-columns: 350px 1fr 320px;
            grid-template-rows: 80px 1fr 200px; 
            gap: 10px; height: 100vh; box-sizing: border-box; overflow: hidden;
        }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 10px; position: relative; }
        .panel::after { content: ""; position: absolute; top:0; left:0; width:100%; height:1px; background: var(--accent); opacity: 0.3; }
        
        /* Header */
        .header { grid-column: 1 / 4; display: flex; justify-content: space-between; align-items: center; }
        .price-main { font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 10px var(--accent); }

        /* Zodiac Chart */
        .zodiac-container { grid-column: 1 / 2; grid-row: 2 / 3; display: flex; flex-direction: column; align-items: center; }
        #zodiacChart { max-width: 100%; margin-top: 10px; }

        /* Main Chart */
        #chart-main { grid-column: 2 / 3; grid-row: 2 / 3; padding: 0; }

        /* Tech Signals */
        .signals { grid-column: 3 / 4; grid-row: 2 / 4; display: flex; flex-direction: column; gap: 15px; }
        .signal-card { border: 1px solid #222; padding: 10px; background: #000; }
        .signal-val { font-size: 1.2rem; float: right; }
        .buy { color: #00ffcc; } .sell { color: #ff3e3e; }

        /* Console */
        .console { grid-column: 1 / 3; grid-row: 3 / 4; background: #000; font-size: 0.7rem; color: var(--dim); overflow-y: auto; }
        
        h3 { font-size: 0.8rem; text-transform: uppercase; margin: 0 0 10px 0; border-bottom: 1px solid #222; padding-bottom: 5px; color: #fff; }
        .tag { background: var(--accent); color: #000; padding: 2px 5px; font-size: 0.6rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="header panel">
    <div>
        <div class="tag">SYSTEM ACTIVE</div>
        <div style="font-size: 1.2rem;">ASTRO-QUANT_OS <span style="color: #555;">v2.7.0</span></div>
    </div>
    <div class="price-main" id="price-display">$ --,---.--</div>
    <div id="insight-box" style="max-width: 400px; font-size: 0.8rem; text-align: right; color: #fff;">BOOTING_CORE...</div>
</div>

<div class="zodiac-container panel">
    <h3>Geocentric Radix</h3>
    <canvas id="zodiacChart"></canvas>
    <div id="astro-details" style="font-size: 0.75rem; margin-top: 15px; width: 100%;"></div>
</div>

<div id="chart-main" class="panel">
    <div id="tv-chart" style="width: 100%; height: 100%;"></div>
</div>

<div class="signals panel">
    <h3>Market Intelligence</h3>
    <div class="signal-card">
        RSI (14) <span id="rsi-val" class="signal-val">--</span>
    </div>
    <div class="signal-card">
        EMA 200 <span id="ema-status" class="signal-val">--</span>
    </div>
    <div class="signal-card">
        MACD Hist <span id="macd-val" class="signal-val">--</span>
    </div>
    <div class="signal-card" style="border-color: var(--accent);">
        POWER_SCORE <span id="power-score" class="signal-val" style="color: var(--accent);">--%</span>
    </div>
    <div style="flex-grow: 1;"></div>
    <div style="font-size: 0.6rem; color: #444;">
        UPLINK: RENDER_CLOUD<br>
        DATA: KUCOIN_PRO_FEED
    </div>
</div>

<div class="console panel" id="console-out"></div>

<script>
    const API_BASE = "https://astroquant.onrender.com";
    let chart, candleSeries, zodiacRadar;

    // 1. Inicializar Gráfico de Trading
    function initTradingChart() {
        chart = LightweightCharts.createChart(document.getElementById('tv-chart'), {
            layout: { background: { color: '#0a0a0a' }, textColor: '#00ffcc' },
            grid: { vertLines: { color: '#161616' }, horzLines: { color: '#161616' } },
            timeScale: { timeVisible: true, borderColor: '#333' }
        });
        candleSeries = chart.addCandlestickSeries({
            upColor: '#00ffcc', downColor: '#ff3e3e', borderVisible: false,
            wickUpColor: '#00ffcc', wickDownColor: '#ff3e3e'
        });
    }

    // 2. Inicializar Radar Zodiacal (Chart.js)
    function initZodiac() {
        const ctx = document.getElementById('zodiacChart').getContext('2d');
        zodiacRadar = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Ari', 'Tau', 'Gem', 'Can', 'Leo', 'Vir', 'Lib', 'Sco', 'Sag', 'Cap', 'Aqu', 'Pis'],
                datasets: [{
                    label: 'Planet Power',
                    data: new Array(12).fill(0),
                    backgroundColor: 'rgba(0, 255, 204, 0.2)',
                    borderColor: '#00ffcc',
                    borderWidth: 1,
                    pointBackgroundColor: '#fff'
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: '#222' },
                        grid: { color: '#222' },
                        pointLabels: { color: '#00ffcc', font: { size: 10 } },
                        ticks: { display: false }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function addLog(m) {
        const c = document.getElementById('console-out');
        c.innerHTML += `<div><span style="color:#444">[${new Date().toLocaleTimeString()}]</span> ${m}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    async function update() {
        try {
            const [resA, resC] = await Promise.all([
                fetch(`${API_BASE}/analisis`),
                fetch(`${API_BASE}/candles-1h`)
            ]);
            const data = await resA.json();
            const candles = await resC.json();

            // UI
            document.getElementById('price-display').innerText = `$ ${data.btc_price.toLocaleString()}`;
            document.getElementById('insight-box').innerText = data.insight;

            // Zodiac Logic
            const planetValues = new Array(12).fill(0);
            let astroHTML = "";
            Object.entries(data.astrology).forEach(([p, pos], i) => {
                const deg = parseFloat(pos);
                const signIdx = Math.floor(deg / 30);
                planetValues[signIdx] += 10; // Fuerza visual
                astroHTML += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #111">
                                <span>${p}</span><span>${pos}</span>
                              </div>`;
            });
            zodiacRadar.data.datasets[0].data = planetValues;
            zodiacRadar.update();
            document.getElementById('astro-details').innerHTML = astroHTML;

            // Trading Chart
            if(candles.length > 0) {
                candleSeries.setData(candles.map(c => ({
                    time: c.time/1000, open: c.open, high: c.high, low: c.low, close: c.close
                })));
                const last = candles[candles.length-1];
                document.getElementById('rsi-val').innerText = last.rsi.toFixed(2);
                document.getElementById('rsi-val').className = `signal-val ${last.rsi > 70 ? 'sell' : last.rsi < 30 ? 'buy' : ''}`;
                document.getElementById('ema-status').innerText = last.close > last.ema200 ? "BULLISH" : "BEARISH";
                document.getElementById('macd-val').innerText = last.macd_h.toFixed(2);
                
                // Power Score Inventado (RSI + EMA)
                const score = Math.floor((last.rsi + (last.close > last.ema200 ? 50 : 0)) / 1.5);
                document.getElementById('power-score').innerText = `${score}%`;
            }
            addLog("CORE_SYNC: SUCCESSFUL");
        } catch(e) {
            addLog("CORE_SYNC: FAILED_RETRYING...");
        }
    }

    initTradingChart();
    initZodiac();
    update();
    setInterval(update, 30000);
</script>
</body>
</html>
