<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASTRO-QUANT_OS // v2.9.0</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #151921; --accent: #7d84ff;
            --text: #e1e1e1; --bull: #00ffcc; --bear: #ff3e3e;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
            display: grid; grid-template-columns: 350px 1fr;
            grid-template-rows: 80px 1fr; gap: 15px;
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }
        .panel { background: var(--panel); border-radius: 8px; border: 1px solid #2a2e39; padding: 15px; }
        
        /* Header */
        .header { grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; }
        .price-big { font-size: 2.5rem; color: var(--bull); font-weight: bold; font-family: monospace; }

        /* Sidebar */
        .sidebar { grid-column: 1 / 2; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .carta-natal { height: 350px; display: flex; justify-content: center; align-items: center; position: relative; }
        #zodiacCanvas { max-width: 100%; height: 300px; }
        .astro-list { font-size: 0.8rem; font-family: monospace; }

        /* Charts Container */
        .charts-container { 
            grid-column: 2 / 3; display: grid; 
            grid-template-rows: 1.5fr 1fr 1fr; gap: 15px; 
            overflow-y: auto; padding-right: 5px;
        }
        .chart-box { position: relative; min-height: 200px; }
        .chart-label { 
            position: absolute; top: 10px; left: 10px; z-index: 10; 
            font-size: 0.65rem; color: #888; background: rgba(0,0,0,0.6); 
            padding: 2px 8px; border-radius: 4px; pointer-events: none;
        }

        /* Loading */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 999; transition: 0.5s;
        }
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loader">
    <div style="text-align: center;">
        <div style="width:40px; height:40px; border:3px solid #1a1e26; border-top-color:var(--accent); border-radius:50%; animation: spin 1s linear infinite; margin-bottom:15px;"></div>
        <div style="letter-spacing: 5px; color: var(--accent); font-size: 12px;">SYNCING_DRIVE_DATA</div>
    </div>
</div>

<div class="header panel">
    <div>
        <h1 style="margin:0; font-size: 1rem; letter-spacing: 2px;">ASTRO-QUANT_OS <span style="color:var(--accent)">v2.9.0</span></h1>
        <small id="last-sync" style="color:#555">WAITING FOR DATA...</small>
    </div>
    <div class="price-big" id="btc-price">$ --,---</div>
    <div id="insight-box" style="font-size: 0.8rem; max-width: 300px; text-align: right; color: #aaa;">
        INITIALIZING_LOGIC...
    </div>
</div>

<div class="sidebar">
    <div class="panel carta-natal">
        <canvas id="zodiacCanvas"></canvas>
    </div>
    <div class="panel">
        <div class="astro-list" id="astro-data"></div>
    </div>
</div>

<div class="charts-container">
    <div class="panel chart-box">
        <div class="chart-label">PRICE / EMA 200</div>
        <div id="chart-price" style="height: 100%;"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-label">RSI (14)</div>
        <div id="chart-rsi" style="height: 100%;"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-label">MACD HISTOGRAM</div>
        <div id="chart-macd" style="height: 100%;"></div>
    </div>
</div>

<script>
    // URL de tu JSON en Dropbox con ?raw=1 al final
    const DATA_URL = "https://dl.dropboxusercontent.com/scl/fi/yerm8atcnk78rcdfq7ihp/astro_data.json"; 
    
    let charts = {}, series = {};

    function init() {
        const cfg = {
            layout: { background: { color: '#151921' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1a1e26' }, horzLines: { color: '#1a1e26' } },
            timeScale: { borderColor: '#2a2e39', timeVisible: true }
        };

        // Chart 1: Price
        charts.price = LightweightCharts.createChart(document.getElementById('chart-price'), cfg);
        series.candles = charts.price.addCandlestickSeries({ upColor: '#00ffcc', downColor: '#ff3e3e', borderVisible: false });
        series.ema = charts.price.addLineSeries({ color: '#ff9f43', lineWidth: 1, title: 'EMA 200' });

        // Chart 2: RSI
        charts.rsi = LightweightCharts.createChart(document.getElementById('chart-rsi'), cfg);
        series.rsi = charts.rsi.addLineSeries({ color: '#7d84ff', lineWidth: 2 });
        charts.rsi.addLineSeries({ color: '#444', lineWidth: 1, lineStyle: 2 }).setData([{time:0, value:70}, {time:9999999999, value:70}]);
        charts.rsi.addLineSeries({ color: '#444', lineWidth: 1, lineStyle: 2 }).setData([{time:0, value:30}, {time:9999999999, value:30}]);

        // Chart 3: MACD
        charts.macd = LightweightCharts.createChart(document.getElementById('chart-macd'), cfg);
        series.macd = charts.macd.addHistogramSeries();

        update();
        setInterval(update, 60000); // Sincroniza cada minuto
    }

    async function update() {
        try {
            const res = await fetch(DATA_URL, { cache: "no-store" });
            const data = await res.json();

            // 1. Header & Insight
            document.getElementById('btc-price').innerText = `$ ${data.analysis.btc_price.toLocaleString()}`;
            document.getElementById('insight-box').innerText = data.analysis.insight;
            document.getElementById('last-sync').innerText = `LAST_SYNC: ${new Date(data.analysis.timestamp).toLocaleTimeString()}`;

            // 2. Gráficos
            const candles = data.candles.map(c => ({
                time: c.time / 1000, open: c.open, high: c.high, low: c.low, close: c.close
            }));
            series.candles.setData(candles);
            
            series.ema.setData(data.candles.map(c => ({ time: c.time/1000, value: c.ema200 })));
            series.rsi.setData(data.candles.map(c => ({ time: c.time/1000, value: c.rsi })));
            series.macd.setData(data.candles.map(c => ({ 
                time: c.time/1000, 
                value: c.macd_h, 
                color: c.macd_h >= 0 ? '#00ffcc' : '#ff3e3e' 
            })));

            // 3. Astronomía
            drawZodiac(data.analysis.astrology);
            renderAstroList(data.analysis.astrology);

            document.getElementById('loader').classList.add('fade-out');
        } catch (e) {
            console.error("Sync Error:", e);
        }
    }

    function drawZodiac(planets) {
        const canvas = document.getElementById('zodiacCanvas');
        const ctx = canvas.getContext('2d');
        const cx = 150, cy = 150, r = 90;
        canvas.width = 300; canvas.height = 300;

        const pConf = { 'Sun':'☉','Moon':'☽','Mars':'♂','Jupiter':'♃','Saturn':'♄','Venus':'♀','Mercury':'☿' };
        const signs = ['ARI','TAU','GEM','CAN','LEO','VIR','LIB','SCO','SAG','CAP','AQU','PIS'];

        ctx.clearRect(0,0,300,300);
        ctx.strokeStyle = '#2a2e39';
        
        // Círculo y casas
        for(let i=0; i<12; i++) {
            let a = (i*30 - 180) * Math.PI/180;
            ctx.beginPath();
            ctx.moveTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
            ctx.lineTo(cx + (r+30)*Math.cos(a), cy + (r+30)*Math.sin(a));
            ctx.stroke();
        }

        // Planetas
        Object.entries(planets).forEach(([p, pos]) => {
            let a = (parseFloat(pos) - 180) * Math.PI/180;
            ctx.fillStyle = (p === 'Sun' || p === 'Mars') ? '#ff3e3e' : '#7d84ff';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(pConf[p] || '●', cx + (r-20)*Math.cos(a), cy + (r-20)*Math.sin(a));
        });
    }

    function renderAstroList(planets) {
        let html = '<div style="color:#555; margin-bottom:10px">PLANETARY_POSITIONS</div>';
        Object.entries(planets).forEach(([p, pos]) => {
            html += `<div style="display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px solid #1a1e26">
                <span style="color:var(--accent)">${p.toUpperCase()}</span>
                <span>${pos}°</span>
            </div>`;
        });
        document.getElementById('astro-data').innerHTML = html;
    }

    window.onload = init;
</script>

<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
