<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASTRO-QUANT_OS / 1 HOUR ASTROLOGY BITCOIN SIGNALS</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #11141d; --accent: #7d84ff;
            --text: #d1d4dc; --bull: #00ffcc; --bear: #ff3e3e;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
            display: grid; grid-template-columns: 380px 1fr;
            grid-template-rows: 90px 1fr; gap: 15px;
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }
        .panel { background: var(--panel); border-radius: 12px; border: 1px solid #1e222d; padding: 20px; position: relative; display: flex; flex-direction: column; }
        .header { grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; border-bottom: 2px solid var(--accent); }
        .price-big { font-size: 3.5rem; color: var(--bull); font-weight: 900; letter-spacing: -2px; }
        
        .sidebar { grid-column: 1 / 2; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        
        /* Ajuste de Grid para asegurar visibilidad */
        .charts-container { 
            grid-column: 2 / 3; display: grid; 
            grid-template-rows: 150px 1fr 100px 100px 100px; gap: 10px; 
            height: 100%; overflow: hidden;
        }
        .chart-box { position: relative; flex-grow: 1; min-height: 0; }
        .chart-title { 
            position: absolute; top: 8px; left: 12px; z-index: 10;
            font-size: 0.7rem; font-weight: bold; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px; pointer-events: none; background: rgba(17,20,29,0.8); padding: 2px 5px; border-radius: 4px;
        }
        .astro-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a1e26; font-family: monospace; font-size: 0.85rem;}
        #chart-signals, #chart-price, #chart-osc, #chart-macd, #chart-ao { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="header panel">
    <div>
        <h1 style="margin:0; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px;">ASTRO-QUANT_OS <span style="color:#fff">// v3.5.5</span></h1>
        <small style="color:#444;">BTC/USD 1 HOUR ASTROLOGY CHART</small>
    </div>
    <div class="price-big" id="btc-price">$ 00,000</div>
    <div id="insight-box" style="text-align: right; font-family: monospace; color: #888; font-size: 0.8rem; max-width: 300px;">CORE_RELOADED</div>
</div>

<div class="sidebar">
    <div class="panel" style="height: 300px; min-height: 300px; justify-content: center; align-items: center;">
        <canvas id="zodiacCanvas"></canvas>
    </div>
    <div class="panel" id="astro-list" style="flex-grow: 1; overflow-y: auto;"></div>
</div>

<div class="charts-container">
    <div class="panel chart-box">
        <div class="chart-title">SIGNAL_TRACKS // PIANO_ROLL</div>
        <div id="chart-signals"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-title">BTC/USD 1 HOUR ASTROLOGY CHART</div>
        <div id="chart-price"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-title">OSCILLATORS</div>
        <div id="chart-osc"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-title">MACD</div>
        <div id="chart-macd"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-title">AO</div>
        <div id="chart-ao"></div>
    </div>
</div>

<script>
	const DATA_URL = "https://dl.dropboxusercontent.com/scl/fi/yerm8atcnk78rcdfq7ihp/astro_data.json?rlkey=ealnhng58twb9y7ipeeek725k&st=pd3zmfzx&raw=1"; 
    let charts = {}, series = {};

    function init() {
        const theme = {
            layout: { background: { color: 'transparent' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
            timeScale: { borderColor: '#2a2e39', timeVisible: true },
            crosshair: { mode: 0 }
        };

        const create = (id, opt = {}) => LightweightCharts.createChart(document.getElementById(id), {...theme, ...opt});

        charts.signals = create('chart-signals', { rightPriceScale: { visible: true } });
        charts.price = create('chart-price');
        charts.osc = create('chart-osc', { leftPriceScale: { visible: true } });
        charts.macd = create('chart-macd');
        charts.ao = create('chart-ao');

        // PIANO ROLL
        const laneStyle = { color: 'transparent', lastValueVisible: true, priceLineVisible: false };
        series.laneRSI = charts.signals.addLineSeries({...laneStyle, title: 'RSI'});
        series.laneWILL = charts.signals.addLineSeries({...laneStyle, title: 'WILL'});
        series.laneMACD = charts.signals.addLineSeries({...laneStyle, title: 'MACD'});
        series.laneAO = charts.signals.addLineSeries({...laneStyle, title: 'AO'});
        series.laneEMA = charts.signals.addLineSeries({...laneStyle, title: 'EMA'});

        charts.signals.priceScale('right').applyOptions({ autoScale: false, axisLabelVisible: false });

        series.candles = charts.price.addCandlestickSeries({ upColor: '#00ffcc', downColor: '#ff3e3e', borderVisible: false });
        series.ema20 = charts.price.addLineSeries({ color: '#55EFC4', lineWidth: 1 });
        series.bbUpper = charts.price.addLineSeries({ color: 'rgba(255, 255, 255, 0.1)', lineWidth: 1, lineStyle: 2 });
        series.bbLower = charts.price.addLineSeries({ color: 'rgba(255, 255, 255, 0.1)', lineWidth: 1, lineStyle: 2 });

        series.rsi = charts.osc.addLineSeries({ color: '#7d84ff', lineWidth: 2 });
        series.willr = charts.osc.addLineSeries({ color: '#ff7675', lineWidth: 1, priceScaleId: 'left' });
        series.macd = charts.macd.addHistogramSeries({ base: 0 });
        series.ao = charts.ao.addHistogramSeries({ base: 0 });

        // Sync
        Object.keys(charts).forEach(s => {
            charts[s].timeScale().subscribeVisibleLogicalRangeChange(r => {
                Object.keys(charts).forEach(t => { if(s!==t) charts[t].timeScale().setVisibleLogicalRange(r); });
            });
        });

        // Resize observer para asegurar renderizado
        const ro = new ResizeObserver(() => {
            Object.values(charts).forEach(c => {
                const container = c.chartElement().parentElement;
                c.resize(container.clientWidth, container.clientHeight);
            });
        });
        document.querySelectorAll('.chart-box').forEach(el => ro.observe(el));

        update();
        setInterval(update, 30000);
    }

    async function update() {
        try {
            const res = await fetch(DATA_URL, { cache: "no-store" });
            const data = await res.json();
            const candles = data.candles;
            const t = c => c.time / 1000;

            document.getElementById('btc-price').innerText = `$ ${data.analysis.btc_price.toLocaleString()}`;
            document.getElementById('insight-box').innerText = data.analysis.insight;

            series.candles.setData(candles.map(c => ({ time: t(c), open: c.open, high: c.high, low: c.low, close: c.close })));
            series.ema20.setData(candles.filter(c => c.ema20).map(c => ({ time: t(c), value: c.ema20 })));
            series.bbUpper.setData(candles.filter(c => c.bb_upper).map(c => ({ time: t(c), value: c.bb_upper })));
            series.bbLower.setData(candles.filter(c => c.bb_lower).map(c => ({ time: t(c), value: c.bb_lower })));

            series.rsi.setData(candles.map(c => ({ time: t(c), value: c.rsi })));
            series.willr.setData(candles.map(c => ({ time: t(c), value: c.willr })));
            series.macd.setData(candles.map(c => ({ time: t(c), value: c.macd_h, color: c.macd_h >= 0 ? '#00ffcc' : '#ff3e3e' })));
            series.ao.setData(candles.map(c => ({ time: t(c), value: c.ao, color: c.ao >= 0 ? '#00ffcc' : '#ff3e3e' })));

            // Piano Roll Data
            const rsiM = [], rsiD = [];
            candles.forEach((c, i) => {
                const time = t(c);
                rsiD.push({ time, value: 90 });
                if (c.rsi < 30) rsiM.push({ time, position: 'inBar', color: '#00ffcc', shape: 'circle', text: 'RSI' });
            });
            series.laneRSI.setData(rsiD); series.laneRSI.setMarkers(rsiM);

            drawZodiac(data.analysis.astrology);
            renderList(data.analysis.astrology);
        } catch (e) { console.error(e); }
    }

    function drawZodiac(planets) {
        const canvas = document.getElementById('zodiacCanvas');
        const ctx = canvas.getContext('2d');
        const cx = 150, cy = 150, rIn = 60, rOut = 100;
        canvas.width = 300; canvas.height = 300;
        ctx.clearRect(0, 0, 300, 300); ctx.strokeStyle = '#2a2e39';
        ctx.beginPath(); ctx.arc(cx, cy, rIn, 0, Math.PI * 2); ctx.stroke();
        Object.entries(planets).forEach(([name, pos]) => {
            const angle = (parseFloat(pos) + 180) * Math.PI / 180;
            const x = cx + (rIn - 20) * Math.cos(angle); const y = cy + (rIn - 20) * Math.sin(angle);
            ctx.fillStyle = '#7d84ff'; ctx.font = '10px Arial'; ctx.fillText(name[0], x, y);
        });
    }

    function renderList(planets) {
        let h = ''; Object.entries(planets).forEach(([n, p]) => { h += `<div class="astro-row"><span>${n}</span><span>${p}°</span></div>`; });
        document.getElementById('astro-list').innerHTML = h;
    }

    window.onload = init;
</script>
</body>
</html>
