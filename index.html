<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASTRO-QUANT_OS // v2.8.4</title>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #151921; --accent: #7d84ff;
            --text: #e1e1e1; --bull: #00ffcc; --bear: #ff3e3e;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 15px;
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 80px 1fr;
            gap: 15px; height: 100vh; box-sizing: border-box;
        }
        .panel { background: var(--panel); border-radius: 8px; border: 1px solid #2a2e39; padding: 15px; overflow: hidden; }
        
        /* Header */
        .header { grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; }
        .price-big { font-size: 2.8rem; color: var(--bull); font-weight: bold; }

        /* Left Sidebar: Carta Natal */
        .sidebar { grid-column: 1 / 2; display: flex; flex-direction: column; gap: 15px; }
        .carta-natal { height: 450px; position: relative; text-align: center; }
        #zodiacCanvas { max-width: 100%; height: 280px; }
        .astro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem; margin-top: 10px; }

        #zodiacCanvas { 
        font-family: "Noto Sans Symbols", "DejaVu Sans", sans-serif; 
        max-width: 100%; 
        height: 300px; /* Ajusta la altura para que sea cuadrado */
        }
        
        /* Main Content: 3 Gráficos */
        .charts-container { 
            grid-column: 2 / 3; display: grid; 
            grid-template-rows: 2fr 1fr 1fr 1fr; gap: 10px; 
            overflow-y: auto; padding-right: 5px;
        }
        .chart-box { height: 200px; min-height: 180px; width: 100%; position: relative; }
        .chart-box.main { height: 350px; }
        .chart-label { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 0.8rem; color: #aaa; background: rgba(0,0,0,0.5); padding: 2px 5px; }
    </style>
</head>
<body>

<div class="header panel">
    <div>
        <h2 style="margin:0; font-size: 1rem;">ASTRO-QUANT_OS // <span style="color:var(--accent)">v2.8.4</span></h2>
        <small id="status" style="color: #666;">FASE LUNAR: ANALIZANDO...</small>
    </div>
    <div class="price-big" id="btc-price">$ --.---,--</div>
    <div id="indicators-top" style="font-size: 0.9rem; color: var(--accent);">RSI: -- | WILLR: -- | AO: --</div>
</div>

<div class="sidebar">
    <div class="panel carta-natal">
        <h3 style="font-size: 0.9rem; margin-top:0;">Carta Natal del Mercado</h3>
        <canvas id="zodiacCanvas"></canvas>
        <div class="astro-grid" id="astro-data"></div>
    </div>
    <div class="panel" style="flex-grow: 1;">
        <h3 style="font-size: 0.8rem;">Tendencia 6H (Momentum)</h3>
        <div id="momentum-mini" style="height: 100px;"></div>
    </div>
</div>

<div class="charts-container">
    <div class="panel chart-box main">
        <div class="chart-label">BTC/USDT 1H - Señales de Confluencia</div>
        <div id="chart-price" style="height: 100%;"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-label">RSI (14)</div>
        <div id="chart-rsi" style="height: 100%;"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-label">MACD (12, 26, 9)</div>
        <div id="chart-macd" style="height: 100%;"></div>
    </div>
    <div class="panel chart-box">
        <div class="chart-label">Awesome Oscillator</div>
        <div id="chart-ao" style="height: 100%;"></div>
    </div>
</div>

<script>
    const API_BASE = "https://astroquant.onrender.com";
    let mainChart, rsiSeries, macdSeries, aoSeries, candleSeries;

    // --- INICIALIZAR GRÁFICOS ---
    function initCharts() {
        const cfg = {
            layout: { background: { color: '#151921' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { borderColor: '#2a2e39' }
        };

        // Price Chart
        mainChart = LightweightCharts.createChart(document.getElementById('chart-price'), cfg);
        candleSeries = mainChart.addCandlestickSeries({ upColor: '#00ffcc', downColor: '#ff3e3e' });

        // RSI Chart
        const rsiChart = LightweightCharts.createChart(document.getElementById('chart-rsi'), cfg);
        rsiSeries = rsiChart.addLineSeries({ color: '#7d84ff', lineWidth: 2 });

        // MACD Chart
        const macdChart = LightweightCharts.createChart(document.getElementById('chart-macd'), cfg);
        macdSeries = macdChart.addHistogramSeries({ color: '#26a69a' });

        // AO Chart
        const aoChart = LightweightCharts.createChart(document.getElementById('chart-ao'), cfg);
        aoSeries = aoChart.addHistogramSeries({ color: '#ff5252' });
    }

    // --- DIBUJAR CARTA NATAL (CANVAS) ---
function drawZodiac(planets) {
    const canvas = document.getElementById('zodiacCanvas');
    const ctx = canvas.getContext('2d');
    
    // Configuración de resolución y centro
    canvas.width = 300;
    canvas.height = 300;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    
    // Anillos: Externo (Divisiones), Interno (Posición de Planetas)
    const zodiacRadius = 135; // Anillo exterior con los nombres de los signos
    const radixRadius = 100; // Anillo interior con las divisiones de 30°

    // Configuración de estilos y glifos por planeta
    const planetConfig = {
        'Sun':     { glyph: '☉', color: '#FFD700', size: 18 }, // Oro
        'Moon':    { glyph: '☽', color: '#FFFFFF', size: 16 }, // Blanco
        'Mars':    { glyph: '♂', color: '#FF3E3E', size: 16 }, // Rojo
        'Jupiter': { glyph: '♃', color: '#7D84FF', size: 16 }, // Azul/Púrpura
        'Saturn':  { glyph: '♄', color: '#888888', size: 16 }, // Gris
        'Venus':   { glyph: '♀', color: '#00FFCC', size: 16 }, // Verde Neón
        'Mercury': { glyph: '☿', color: '#FFA500', size: 16 }, // Naranja
        'default': { glyph: '●', color: '#7D84FF', size: 12 }
    };

    // Nombres de los signos (empezando en Aries a las 9 en punto)
    const signs = ['ARI', 'TAU', 'GEM', 'CAN', 'LEO', 'VIR', 'LIB', 'SCO', 'SAG', 'CAP', 'AQU', 'PIS'];

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- 1. DIBUJAR ESTRUCTURA DEL ZODIACO ---
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#2a2e39';

    // Círculos concéntricos
    ctx.beginPath();
    ctx.arc(centerX, centerY, zodiacRadius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(centerX, centerY, radixRadius, 0, Math.PI * 2);
    ctx.stroke();

    // Líneas divisoras de signos (cada 30°)
    ctx.font = '10px "Inter", sans-serif';
    for (let i = 0; i < 12; i++) {
        // Rotación de divisiones: Aries empieza a las 9 en punto (180°)
        const angle = (i * 30 - 180) * (Math.PI / 180); 
        
        // Línea divisora
        const sX = centerX + radixRadius * Math.cos(angle);
        const sY = centerY + radixRadius * Math.sin(angle);
        const eX = centerX + zodiacRadius * Math.cos(angle);
        const eY = centerY + zodiacRadius * Math.sin(angle);
        ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(eX, eY); ctx.stroke();

        // Nombres de los Signos (centrados en cada división)
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle + (15 * Math.PI / 180)); // Rotar al centro de la división
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText(signs[i], zodiacRadius - 20, 4);
        ctx.restore();
    }

    // --- 2. POSICIONAR GLIFOS DE PLANETAS ---
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Para evitar superposiciones si dos planetas están en el mismo grado (conjunción)
    const occupiedPositions = [];

    Object.entries(planets).forEach(([name, pos]) => {
        const deg = parseFloat(pos);
        // Ajuste de ángulo para que coincida con el zodiaco (Aries a las 9)
        let angle = (deg - 180) * (Math.PI / 180);
        
        // Ajuste de superposición (muy básico, mueve 2px si ya está ocupado)
        occupiedPositions.forEach(p => {
            if (Math.abs(p - deg) < 3) { // Si están a menos de 3 grados
                angle += (3 * Math.PI / 180);
            }
        });
        occupiedPositions.push(deg);

        // Posición del glifo (un poco por fuera del anillo interior)
        const planetRadius = radixRadius + 15; 
        const x = centerX + planetRadius * Math.cos(angle);
        const y = centerY + planetRadius * Math.sin(angle);

        // Configuración específica del planeta
        const config = planetConfig[name] || planetConfig['default'];

        // Dibujar el Glifo
        ctx.font = `${config.size}px "Noto Sans Symbols", "DejaVu Sans", sans-serif`;
        ctx.fillStyle = config.color;
        
        // Añadir un pequeño brillo
        ctx.shadowBlur = 8;
        ctx.shadowColor = config.color;
        ctx.fillText(config.glyph, x, y);
        ctx.shadowBlur = 0; // Reset brillo
    });
}

    async function sync() {
        try {
            const [resA, resC] = await Promise.all([
                fetch(`${API_BASE}/analisis`),
                fetch(`${API_BASE}/candles-1h`)
            ]);
            const data = await resA.json();
            const candles = await resC.json();

            // Header
            document.getElementById('btc-price').innerText = `$ ${data.btc_price.toLocaleString()}`;
            
            // Astro
            drawZodiac(data.astrology);
            let astroHTML = "";
            Object.entries(data.astrology).forEach(([p, pos]) => {
                astroHTML += `<div><span style="color:#7d84ff">●</span> ${p}: ${pos}</div>`;
            });
            document.getElementById('astro-data').innerHTML = astroHTML;

            // Gráficos
            if (candles.length > 0) {
                const candleData = candles.map(c => ({ time: c.time/1000, open: c.open, high: c.high, low: c.low, close: c.close }));
                candleSeries.setData(candleData);
                
                rsiSeries.setData(candles.map(c => ({ time: c.time/1000, value: c.rsi || 50 })));
                
                aoSeries.setData(candles.map(c => ({ 
                    time: c.time/1000, 
                    value: c.macd_h || 0, // Usamos MACD hist para AO si no tienes AO en el backend
                    color: (c.macd_h > 0) ? '#00ffcc' : '#ff3e3e' 
                })));
                
                const last = candles[candles.length - 1];
                document.getElementById('indicators-top').innerText = `RSI: ${last.rsi.toFixed(2)} | EMA200: ${last.close > last.ema200 ? 'BULL' : 'BEAR'}`;
            }
        } catch (e) { console.error(e); }
    }

    initCharts();
    sync();
    setInterval(sync, 30000);
</script>

</body>
</html>
